name: Weekly Foreclosure Sync

on:
  schedule:
    - cron: "0 15 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify repo structure
        run: |
          echo "=== Root ==="
          ls -la
          echo "=== scrapers/ ==="
          ls -la scrapers/
          echo "=== docs/ ==="
          ls -la docs/ || echo "(docs/ empty or missing)"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install playwright pdfplumber pandas requests beautifulsoup4

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run aggregator
        run: python main.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Show output summary
        run: |
          echo "=== docs/ after run ==="
          ls -lh docs/ || echo "(docs/ missing)"
          if [ -f docs/foreclosures.csv ]; then
            echo "CSV row count: $(wc -l < docs/foreclosures.csv)"
          fi

      - name: Commit and push output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: weekly foreclosure sync $(date -u +'%Y-%m-%d')"
          git fetch origin main
          git push --force origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: docs/*_debug.png
          if-no-files-found: ignore
