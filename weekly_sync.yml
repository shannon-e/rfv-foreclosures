name: Weekly Foreclosure Sync

on:
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: List repo contents (debug)
        run: |
          echo "=== Root ==="
          ls -la
          echo "=== scrapers/ ==="
          ls -la scrapers/ || echo "scrapers/ not found"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install playwright pdfplumber pandas requests beautifulsoup4

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run aggregator
        run: python main.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Push output files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f output/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: weekly foreclosure data sync $(date -u +'%Y-%m-%d')"
          git push --force-with-lease origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
