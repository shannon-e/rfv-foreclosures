name: Weekly Foreclosure Sync

on:
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install playwright pdfplumber pandas requests beautifulsoup4

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run aggregator
        run: python main.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Commit updated output files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: weekly foreclosure data sync"
          file_pattern: "output/*"
